name: Backfill SEO for All Content Types

on:
  workflow_dispatch: # Manual trigger only
    inputs:
      skipPosts:
        description: "Skip posts backfill"
        required: false
        default: false
        type: boolean
      skipDestinations:
        description: "Skip destinations backfill"
        required: false
        default: false
        type: boolean
      skipGuides:
        description: "Skip guides backfill"
        required: false
        default: false
        type: boolean

jobs:
  backfill-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install tsx (TypeScript runner)
        run: npm install -D tsx

      # ---------------------------
      # Backfill Posts
      # ---------------------------
      - name: Backfill SEO for Posts (Blog)
        if: ${{ !inputs.skipPosts }}
        run: npx tsx scripts/backfill-seo.ts
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # ---------------------------
      # Backfill Destinations
      # ---------------------------
      - name: Backfill SEO for Destinations
        if: ${{ !inputs.skipDestinations }}
        run: npx tsx scripts/backfill-destinations-seo.ts
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # ---------------------------
      # Backfill Guides
      # ---------------------------
      - name: Backfill SEO for Guides
        if: ${{ !inputs.skipGuides }}
        run: npx tsx scripts/backfill-guides-seo.ts
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Done
        run: echo "✅ SEO backfill completed"
